name: dotnet-ci

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: "8.0.x"
  IMAGE_NAME: ghcr.io/dubois-laurent/locationvoiture

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore app/tests/LocationVoiture.Tests/LocationVoiture.Tests.csproj

      - name: Quality check
        run: |
          dotnet format app/locationvoiture.csproj --verify-no-changes
          dotnet format app/tests/LocationVoiture.Tests/LocationVoiture.Tests.csproj --verify-no-changes

      - name: Run tests
        run: dotnet test app/tests/LocationVoiture.Tests/LocationVoiture.Tests.csproj --configuration Release --no-restore

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -f app/Dockerfile app

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image for release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest